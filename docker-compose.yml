services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sipra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sipra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sipra_dev}
      POSTGRES_DB: ${POSTGRES_DB:-sipra}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
      - ./infra/docker/postgres/seed.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sipra} -d ${POSTGRES_DB:-sipra}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sipra-net

  redis:
    image: redis:7-alpine
    container_name: sipra-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - sipra-net

  ai-brain:
    build:
      context: ./services/ai-brain
      dockerfile: Dockerfile
    container_name: sipra-ai-brain
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sipra-net

  fleet-receiver:
    build:
      context: ./services/mocks/fleet-receiver
      dockerfile: Dockerfile
    container_name: sipra-fleet-receiver
    restart: unless-stopped
    ports:
      - "4000:4000"
    networks:
      - sipra-net

  drone-dispatch:
    build:
      context: ./services/mocks/drone-dispatch
      dockerfile: Dockerfile
    container_name: sipra-drone-dispatch
    restart: unless-stopped
    ports:
      - "4003:4003"
    networks:
      - sipra-net

  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    container_name: sipra-valhalla
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      tile_urls: "https://download.geofabrik.de/asia/india/southern-zone-latest.osm.pbf"
      serve_tiles: "True"
      build_elevation: "False"
      build_admins: "False"
      use_default_speeds_config: "True"
      force_rebuild: "False"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/status >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 40s
    networks:
      - sipra-net

volumes:
  postgres_data:
  redis_data:

networks:
  sipra-net:
    driver: bridge
